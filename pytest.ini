[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests for individual functions
    integration: Integration tests across modules
    encoding: Tests related to payload encoding
    fallback: Tests for encoding fallback mechanism
    fuzzer: Tests for fuzzing functionality
    bruteforce: Tests for bruteforce mode
    slow: Slow running tests
